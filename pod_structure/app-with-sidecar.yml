apiVersion: v1
kind: Pod
metadata:
  name: app-with-sidecar
  labels:
    app: app-with-sidecar
spec:
  containers:
    # Main app container that writes logs
    - name: app
      image: alpine:latest
      command: ['sh', '-c', 'while true; do echo "logging at $(date)" >> /opt/logs.txt; sleep 1; done']
      volumeMounts:
        - name: data
          mountPath: /opt
    # Sidecar container that tails logs
    - name: log-shipper
      image: alpine:latest
      command: ['sh', '-c', 'tail -F /opt/logs.txt']
      volumeMounts:
        - name: data
          mountPath: /opt
  volumes:
    - name: data
      emptyDir: {}
