apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-deployment
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: app
          image: my-app:1.0
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "v2.1.0"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config-imperative
                  key: DB_HOST    
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret-imperative
                  key: DB_PASSWORD  
          envFrom:
            - configMapRef:
                name: app-config-declarative
            - secretRef:
                name: db-secret-declarative 
